<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Medi-o Eng - Canteiro Pro</title>

  <!-- 1. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 2. React e ReactDOM (Mantenha a versão 18) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- 3. Lucide Icons (Precisa vir DEPOIS do React) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/lucide-react@latest"></script>

  <!-- 4. Babel Standalone (Para interpretar o app.jsx) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 5. Firebase v8 CDN (Compatível com db.collection) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    // Configuração do seu projeto no Firebase
    const firebaseConfig = {
      apiKey: "SUA_API_KEY_AQUI",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      projectId: "SEU_PROJETO_ID",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "SEU_MESSAGING_ID",
      appId: "SEU_APP_ID"
    };

    // Inicialização do Firebase
    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    
    // Instância global do Firestore no window.db
    window.db = firebase.firestore();
  </script>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- Elemento Raiz onde o React renderiza -->
  <div id="root"></div>

  <!-- Carregamento do seu aplicativo React -->
  <script type="text/babel" src="app.jsx"></script>

</body>
</html>
