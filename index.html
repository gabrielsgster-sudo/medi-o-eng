<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gestor de Obras - Medição de Canteiro</title>
  <meta name="description" content="App de medição e gestão de canteiro de obra com múltiplas obras, empreiteiros, categorias, aditivos e controle de extrapolação." />

  <!-- Permissões necessárias para câmera/GPS funcionarem corretamente -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!-- Tailwind CSS (utilitário usado em todo o app) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel Standalone: transforma o JSX diretamente no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Import map: resolve os pacotes usados no app.jsx via CDN (esm.sh) -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "lucide-react": "https://esm.sh/lucide-react@0.383.0?external=react"
    }
  }
  </script>

  <!-- App principal: mesmo código/funcionalidade do arquivo original, sem alterações -->
  <script type="text/babel" data-presets="react" data-type="module" src="./app.jsx"></script>
</body>
</html>
