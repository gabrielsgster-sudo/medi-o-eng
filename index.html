<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Medi-o Eng - Canteiro Pro</title>

  <!-- 1. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- 2. React e ReactDOM (v18) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- 3. Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 4. Lucide Icons (Biblioteca base) -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- 5. Firebase v8 CDN -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    // Configuração do Firebase com suas credenciais do projeto medi-o-eng
    const firebaseConfig = {
      apiKey: "AIzaSyDE6EoGpq-xj7QyGoG2oV90dwGXu0uIw9E",
      authDomain: "medi-o-eng.firebaseapp.com",
      projectId: "medi-o-eng",
      storageBucket: "medi-o-eng.firebasestorage.app",
      messagingSenderId: "995319040470",
      appId: "1:995319040470:web:0fbc80b1e4b702046ebc77",
      measurementId: "G-W9HYGF6SMC"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }
    window.db = firebase.firestore();

    // Cria componentes React falsos/seguros para qualquer ícone invocado no app.jsx
    // Isso impede o erro #130 do React
    const createDummyIcon = (name) => {
      return function IconComponent(props) {
        const iconName = name.replace(/([a-z])([A-Z])/g, '$1-$2').toLowerCase();
        return React.createElement('i', {
          'data-lucide': iconName,
          className: props.className || '',
          style: props.style
        });
      };
    };

    // Proxy para fornecer qualquer ícone dinamicamente para o React
    window.LucideReact = new Proxy({}, {
      get: (target, prop) => createDummyIcon(prop)
    });
  </script>
</head>
<body class="bg-slate-100 min-h-screen">

  <div id="root"></div>

  <!-- Carrega a aplicação React -->
  <script type="text/babel" src="app.jsx"></script>

  <script>
    // Observa mudanças do DOM e renderiza os ícones vetoriais do Lucide em tempo real
    const observer = new MutationObserver(() => {
      if (window.lucide) {
        lucide.createIcons();
      }
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
